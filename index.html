<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Cosmetics | Digital Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --bg: #0b0c0e;
            --card: rgba(255, 255, 255, 0.03); /* Transparent Glass */
            --blurple: rgba(88, 101, 242, 0.8);
            --nitro: #ff73fa;
            --text: #dbdee1;
            --neon: #5865F2;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'gg sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- SNOW BACKGROUND EFFECT --- */
        #snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .snowflake {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* --- NEON HEADER --- */
        header {
            padding: 80px 20px;
            text-align: center;
        }

        h1 { 
            color: white; 
            font-size: 3.5rem; 
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
            margin: 0;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--blurple);
            box-shadow: 0 0 15px var(--blurple);
        }

        /* --- GLASS CARDS --- */
        .content-section { display: none; width: 100%; max-width: 1200px; }
        .content-section.active { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }

        .card {
            background: var(--card);
            backdrop-filter: blur(15px); /* Transparent Glass Blur */
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 35px;
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--nitro);
            box-shadow: 0 0 30px rgba(255, 115, 250, 0.2);
        }

        /* --- TRANSPARENT BUTTONS --- */
        .buy-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            text-decoration: none;
            padding: 14px;
            border-radius: 12px;
            display: block;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            margin-top: 20px;
        }

        .buy-btn:hover {
            background: var(--blurple);
            border-color: transparent;
            box-shadow: 0 0 20px var(--blurple);
        }

        .price { font-size: 30px; color: white; margin: 15px 0; font-weight: 800; }
        .img-box { font-size: 60px; margin-bottom: 10px; }

        /* --- REVIEWS --- */
        .review-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div id="snow-container"></div>

    <header>
        <h1 class="animate__animated animate__pulse animate__infinite">PREMIUM</h1>
        <p style="color: #80848e;">Secure LTC Delivery • Fast Support</p>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('products')">PRODUCTS</button>
        <button class="tab-btn" onclick="openTab('reviews')">VOUCHES</button>
    </div>

    <div id="products" class="content-section active animate__animated animate__fadeIn">
        <div class="card">
            <div class="img-box">💎</div>
            <h3>Nitro Monthly</h3>
            <p>Full subscription + 2 Boosts.</p>
            <div class="price">$5.00</div>
            <a href="https://discord.com/users/1448047030197817545" class="buy-btn">PURCHASE</a>
        </div>

        <div class="card">
            <div class="img-box">🚀</div>
            <h3>14x Boosts</h3>
            <p>Level 3 server perks instantly.</p>
            <div class="price">$10.00</div>
            <a href="https://discord.com/users/1448047030197817545" class="buy-btn">PURCHASE</a>
        </div>
    </div>

    <div id="reviews" class="content-section animate__animated animate__fadeIn">
        <div class="review-card">
            <p style="color: #f1c40f;">⭐⭐⭐⭐⭐</p>
            <p class="rev-text">"Cleanest site I've seen. Instant delivery."</p>
            <p style="font-size: 12px; color: #5865F2;">— Vouched by User</p>
        </div>
    </div>

    <script>
        // SNOW SCRIPT
        const container = document.getElementById('snow-container');
        for (let i = 0; i < 50; i++) {
            const snow = document.createElement('div');
            snow.className = 'snowflake';
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.width = snow.style.height = Math.random() * 5 + 2 + 'px';
            snow.style.animationDuration = Math.random() * 3 + 2 + 's';
            snow.style.animationDelay = Math.random() * 5 + 's';
            container.appendChild(snow);
        }

        // TAB SCRIPT
        function openTab(tabName) {
            const sections = document.getElementsByClassName("content-section");
            const btns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < sections.length; i++) {
                sections[i].style.display = "none";
                btns[i].classList.remove("active");
            }
            document.getElementById(tabName).style.display = "flex";
            event.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
